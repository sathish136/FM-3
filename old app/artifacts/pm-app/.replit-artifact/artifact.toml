kind = "web"
previewPath = "/pm-app/"
title = "Marketing & Project Management"
version = "1.0.0"
id = "artifacts/pm-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23704
name = "web"
paths = ["/pm-app/"]

[services.development]
run = "pnpm --filter @workspace/pm-app run dev"

[services.env]
PORT = "23704"
BASE_PATH = "/pm-app/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pm-app", "run", "build"]
publicDir = "artifacts/pm-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
