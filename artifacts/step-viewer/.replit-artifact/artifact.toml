kind = "web"
previewPath = "/"
title = "3D STEP File Viewer"
version = "1.0.0"
id = "artifacts/step-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23117
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/step-viewer run dev"

[services.env]
PORT = "23117"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/step-viewer", "run", "build"]
publicDir = "artifacts/step-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
