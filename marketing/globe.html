<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Department - WTT International</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <style>
        #worldMap {
            position: fixed;
            top: 80px;
            left: 250px;
            width: calc(100vw - 250px);
            height: calc(100vh - 80px);
            background: #fff;
            cursor: grab;
        }
        #worldMap:active {
            cursor: grabbing;
        }
        .sphere {
            fill: #e8f4f8;
            stroke: #2c5282;
            stroke-width: 2;
        }
        .country {
            fill: #4a90e2;
            stroke: #2c5282;
            stroke-width: 0.5;
            transition: fill 0.3s;
        }
        .country:hover {
            fill: #6bb6ff;
            cursor: pointer;
        }
        .country.active {
            fill: #03681c;
        }
        .country-label {
            fill: #2c5282;
            font-size: 10px;
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .country-label.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <div class="logo-section">
                <img src="https://res.cloudinary.com/dd8fsxba6/image/upload/v1755166473/logo-bg_less_yaefzj.png" alt="WTT Logo" class="logo">
                <div class="company-info">
                    <h1>WTT International Pvt Ltd</h1>
                    <p>Data Analytics Platform</p>
                </div>
            </div>
        </div>
        <div class="header-title">
            <h2>Marketing Department</h2>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="sidebar">
        <div class="sidebar-brand">
            <img src="https://res.cloudinary.com/dd8fsxba6/image/upload/v1755166473/logo-bg_less_yaefzj.png" alt="WTT Logo">
            <div class="sidebar-brand-info">
                <h4>WTT International Pvt Ltd</h4>
                <p>Data Analytics Platform</p>
            </div>
        </div>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="sales.html">Sales</a>
            <a href="hr.html">Human Resources</a>
            <a href="finance.html">Finance</a>
            <a href="operations.html">Operations</a>
            <a href="marketing.html">Marketing</a>
            <a href="purchase.html">Purchase</a>
            <a href="stores.html">Stores</a>
        </nav>
    </div>
    <div class="overlay" onclick="closeMenu()"></div>
    <svg id="worldMap"></svg>
    <script src="js/main.js"></script>
    <script>
        const container = document.getElementById('worldMap');
        const width = container.clientWidth;
        const height = container.clientHeight;
        
        const svg = d3.select("#worldMap")
            .attr("width", width)
            .attr("height", height);
        
        let rotation = [0, -20];
        let scale = Math.min(width, height) / 2.5;
        const projection = d3.geoOrthographic()
            .scale(scale)
            .translate([width / 2, height / 2])
            .rotate(rotation);
        
        const path = d3.geoPath().projection(projection);
        
        svg.append("circle")
            .attr("class", "sphere")
            .attr("cx", width / 2)
            .attr("cy", height / 2)
            .attr("r", projection.scale());
        
        const activeCountries = ['USA', 'IND', 'GBR', 'DEU', 'AUS', 'CAN', 'JPN'];
        
        d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
            const countries = topojson.feature(data, data.objects.countries);
            
            svg.selectAll(".country")
                .data(countries.features)
                .enter().append("path")
                .attr("class", "country")
                .attr("d", path)
                .classed("active", d => activeCountries.includes(d.id))
                .on("click", function(event, d) {
                    d3.select(this).classed("active", !d3.select(this).classed("active"));
                });
            
            svg.selectAll(".country-label")
                .data(countries.features)
                .enter().append("text")
                .attr("class", "country-label")
                .attr("transform", d => {
                    const centroid = path.centroid(d);
                    return `translate(${centroid})`;
                })
                .text(d => d.properties.name);
            
            updateLabels();
        });
        
        function updateLabels() {
            const zoomLevel = scale / (Math.min(width, height) / 2.5);
            svg.selectAll(".country-label")
                .classed("visible", zoomLevel > 1.5)
                .attr("transform", d => {
                    const centroid = path.centroid(d);
                    return `translate(${centroid})`;
                });
        }
        
        let isDragging = false;
        let lastX, lastY;
        
        svg.on("mousedown", function(event) {
            isDragging = true;
            lastX = event.clientX;
            lastY = event.clientY;
        });
        
        svg.on("mousemove", function(event) {
            if (isDragging) {
                const dx = event.clientX - lastX;
                const dy = event.clientY - lastY;
                rotation[0] += dx * 0.5;
                rotation[1] -= dy * 0.5;
                rotation[1] = Math.max(-90, Math.min(90, rotation[1]));
                projection.rotate(rotation);
                svg.selectAll(".country").attr("d", path);
                updateLabels();
                lastX = event.clientX;
                lastY = event.clientY;
            }
        });
        
        svg.on("mouseup", () => isDragging = false);
        svg.on("mouseleave", () => isDragging = false);
        
        svg.on("wheel", function(event) {
            event.preventDefault();
            const delta = -event.deltaY * 0.5;
            scale = Math.max(100, Math.min(2000, scale + delta));
            projection.scale(scale);
            svg.select(".sphere").attr("r", scale);
            svg.selectAll(".country").attr("d", path);
            updateLabels();
        });
    </script>
</body>
</html>
