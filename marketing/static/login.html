<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WTT International</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dd8fsxba6/image/upload/v1755166473/logo-bg_less_yaefzj.png" alt="WTT Logo" class="login-logo">
            <h1>Welcome to WTT Analytics</h1>
            <h2>Business Analysis Dashboard</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="userId" placeholder="User ID" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div id="errorMsg" class="error-msg"></div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
